services:
  api1:
    image: ghcr.io/fksegundo/rinha-rust-tree-api:sha-33c90d2
    pull_policy: always
    restart: always
    hostname: api1
    cpuset: "0"
    environment:
      RINHA_SELF_WARMUP: "1"
      RINHA_BUSY_POLL_US: "0"
      RINHA_SELF_WARMUP_DURATION_MS: "20000"
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock: -1
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.49"
          memory: "169M"

  api2:
    image: ghcr.io/fksegundo/rinha-rust-tree-api:sha-33c90d2
    pull_policy: always
    restart: always
    hostname: api2
    cpuset: "1"
    environment:
      RINHA_SELF_WARMUP: "1"
      RINHA_BUSY_POLL_US: "0"
      RINHA_SELF_WARMUP_DURATION_MS: "20000"
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock: -1
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.49"
          memory: "169M"

  lb:
    image: ghcr.io/fksegundo/rinha-rust-tree-lb:sha-33c90d2
    pull_policy: always
    restart: always
    user: "0:0"
    cpuset: "2,3"
    ports:
      - "9999:9999"
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.02"
          memory: "8M"

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,uid=0,gid=0,mode=0777
